---

- name: Ganerate config for services (set cluster)
  ansible.builtin.command: >
    kubectl config set-cluster k8s
    --certificate-authority={{ cert_dir }}/{{ ca_cert_file }}
    --embed-certs=true
    --server=https://{{ fqdn }}:6443
    --kubeconfig={{ kube_scheduler_kubeconfig_dir }}/kube-scheduler.kubeconfig

- name: Ganerate config for services (set credentials)
  ansible.builtin.command: >
    kubectl config set-credentials system:kube-scheduler
    --client-certificate={{ cert_dir }}/{{ kube_scheduler_cert_file }}
    --client-key={{ cert_dir }}/{{ kube_scheduler_key_file }}
    --embed-certs=true
    --kubeconfig={{ kube_scheduler_kubeconfig_dir }}/kube-scheduler.kubeconfig

- name: Ganerate config for services (set context)
  ansible.builtin.command: >
    kubectl config set-context default
    --cluster=k8s
    --user=system:kube-scheduler
    --kubeconfig={{ kube_scheduler_kubeconfig_dir }}/kube-scheduler.kubeconfig

- name: Set default context for services config
  ansible.builtin.command: >
    kubectl config use-context default
    --kubeconfig={{ kube_scheduler_kubeconfig_dir }}/kube-scheduler.kubeconfig
