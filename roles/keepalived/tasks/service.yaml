---

- name: Install service Keepalived
  ansible.builtin.template:
    src: keepalived.service.j2
    dest: /etc/systemd/system/keepalived.service
  notify:
    - reload systemd

- name: Enable and start Keepalived
  ansible.builtin.systemd:
    name: keepalived
    state: started
    enabled: yes

- name: Check started service
  ansible.builtin.service:
    name: keepalived
    state: started
  register: keepalived_service_status

- name: Terminate playbook if service is not running
  ansible.builtin.fail:
    msg: "The Keepalived service is not running. Playbook has stoped."
  when: keepalived_service_status.state != 'started'
