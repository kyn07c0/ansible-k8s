---

# CoreDNS версия
version: "1.14.4"

# Сетевые настройки
cluster_domain: "cluster.local"
cluster_dns: "10.32.0.10"
service_cidr: "10.32.0.0/12"

# Ресурсы
replicas: 2
cpu_request: "100m"
cpu_limit: "500m"
memory_request: "70Mi"
memory_limit: "200Mi"

# Нода для размещения (опционально)
node_selector: {}
tolerations: []

# Прокси-настройки (если нужен upstream DNS)
upstream_dns: "8.8.8.8"
proxy_enabled: true
