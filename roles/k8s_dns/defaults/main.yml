---

# CoreDNS версия
k8s_dns_version: "1.14.4"

# Сетевые настройки
k8s_dns_cluster_domain: "cluster.local"
k8s_dns_cluster_dns: "10.32.0.10"
k8s_dns_service_cidr: "10.32.0.0/12"

# Ресурсы
k8s_dns_replicas: 2
k8s_dns_cpu_request: "100m"
k8s_dns_cpu_limit: "500m"
k8s_dns_memory_request: "70Mi"
k8s_dns_memory_limit: "200Mi"

# Нода для размещения (опционально)
k8s_dns_node_selector: {}
k8s_dns_tolerations: []

# Прокси-настройки (если нужен upstream DNS)
k8s_dns_upstream_dns: "8.8.8.8"
k8s_dns_proxy_enabled: true
