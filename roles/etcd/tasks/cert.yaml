  become: false

################################################################################
# Copy CA to remote servers
################################################################################

- name: Copy CA to remote servers
  ansible.builtin.copy:
    src: "{{ cert_local_dir }}/{{ item }}"
    dest: "{{ cert_dir }}/{{ item }}"
    mode: '0600'
  loop:
    - "{{ ca_key_file }}"
    - "{{ ca_cert_file }}"

################################################################################
# Copy etcd certificates to remote servers
################################################################################

- name: Create directory for etcd certificates
  ansible.builtin.file:
    path: "{{ cert_dir }}/etcd"
    state: directory
    mode: '0700'

- name: Copy certificate to remote servers
  ansible.builtin.copy:
    src: "{{ cert_local_dir }}/etcd/{{ item }}"
    dest: "{{ cert_dir }}/etcd/{{ item }}"
    mode: "{{ '0600' if 'key' in item else '0644' }}" # Ключи - 600, сертификаты - 644
  loop:
    - "{{ etcd_server_key_file }}"
    - "{{ etcd_server_cert_file }}"
    - "{{ etcd_peer_key_file }}"
    - "{{ etcd_peer_cert_file }}"
    - "{{ etcd_client_key_file }}"
    - "{{ etcd_client_cert_file }}"
