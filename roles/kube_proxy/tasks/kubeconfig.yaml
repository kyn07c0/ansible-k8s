---

- name: Ganerate config for services (set cluster)
  ansible.builtin.command: >
    kubectl config set-cluster k8s
    --certificate-authority={{ cert_dir }}/{{ ca_cert_file }}
    --embed-certs=true
    --server=https://{{ vip }}:6443
    --kubeconfig={{ kube_proxy_kubeconfig_dir }}/kube-proxy.kubeconfig

- name: Ganerate config for services (set credentials)
  ansible.builtin.command: >
    kubectl config set-credentials system:kube-proxy
    --client-certificate={{ cert_dir }}/{{ kube_proxy_cert_file }}
    --client-key={{ cert_dir }}/{{ kube_proxy_key_file }}
    --embed-certs=true
    --kubeconfig={{ kube_proxy_kubeconfig_dir }}/kube-proxy.kubeconfig

- name: Ganerate config for services (set context)
  ansible.builtin.command: >
    kubectl config set-context default
    --cluster=k8s
    --user=system:kube-proxy
    --kubeconfig={{ kube_proxy_kubeconfig_dir }}/kube-proxy.kubeconfig

- name: Set default context for services config
  ansible.builtin.command: >
    kubectl config use-context default
    --kubeconfig={{ kube_proxy_kubeconfig_dir }}/kube-proxy.kubeconfig
