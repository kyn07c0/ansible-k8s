---

- name: Configure Kubernetes cluster in kubeconfig
  kubernetes.core.k8s_config:
    kubeconfig: "{{ kubelet_kubeconfig_dir }}/kubelet.kubeconfig"
    cluster_name: k8s
    server: "https://{{ vip }}:6443"
    certificate_authority: "{{ cert_dir }}/{{ ca_cert_file }}"
    embed_certs: true
    state: present # Указывает, что кластер должен существовать

- name: Configure Kubernetes credentials in kubeconfig
  kubernetes.core.k8s_config:
    kubeconfig: "{{ kubelet_kubeconfig_dir }}/kubelet.kubeconfig"
    user_name: "system:node:{{ inventory_hostname }}"
    client_certificate: "{{ cert_dir }}/{{ kubelet_cert_file }}"
    client_key: "{{ cert_dir }}/{{ kubelet_key_file }}"
    embed_certs: true
    state: present # Указывает, что учетные данные должны существовать

- name: Configure Kubernetes context in kubeconfig
  kubernetes.core.k8s_config:
    kubeconfig: "{{ kubelet_kubeconfig_dir }}/kubelet.kubeconfig"
    context_name: default
    cluster_name: k8s
    user_name: "system:node:{{ inventory_hostname }}"
    state: present # Указывает, что контекст должен существовать

- name: Set default context in kubeconfig
  kubernetes.core.k8s_config:
    kubeconfig: "{{ kubelet_kubeconfig_dir }}/kubelet.kubeconfig"
    context_name: default
    state: use_context
