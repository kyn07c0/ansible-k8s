---

- name: Generate kubeconfig for worker node
  ansible.builtin.template:
    src: kubelet.kubeconfig.j2
    dest: "{{ kubelet_kubeconfig_dir }}/kubelet.kubeconfig"
    mode: '0600'
  notify: Restart kubelet

- name: Flush handlers to restart kubelet immediately
  ansible.builtin.meta: flush_handlers

- name: Verify kubeconfig connectivity after restart
  ansible.builtin.command: kubectl version --kubeconfig={{ kubelet_kubeconfig_dir }}/kubelet.kubeconfig
  register: kubeconfig_check
  changed_when: false
  failed_when: kubeconfig_check.rc != 0
