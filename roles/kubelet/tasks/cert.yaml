---

- name: Generate private key for workers nodes.
  community.crypto.openssl_privatekey:
    path: "{{ cert_dir }}/kubelet.key"
    size: "{{ key_size }}"
    type: "{{ key_type }}"

- name: Generate a certificate signing request with subject information
  community.crypto.openssl_csr:
    path: "{{ cert_dir }}/kubelet.csr"
    privatekey_path: "{{ cert_dir }}/kubelet.key"
    basic_constraints: "CA:FALSE"
    extended_key_usage:
      - clientAuth
      - serverAuth
    key_usage:
      - digitalSignature
      - keyEncipherment
    key_usage_critical: true
    common_name: "system:node:{{ inventory_hostname }}"
    organization_name: "system:nodes"
    country_name: "{{ country_name }}"
    state_or_province_name: "{{ state_or_province_name }}"
    locality_name: "{{ locality_name }}"
    subject_alt_name: "DNS:{{ inventory_hostname }},IP:127.0.0.1,IP:{{ ansible_host }}"
    create_subject_key_identifier: yes

- name: Generate a certificate
  community.crypto.x509_certificate:
    path: "{{ cert_dir }}/kubelet.crt"
    privatekey_path: "{{ cert_dir }}/kubelet.key"
    csr_path: "{{ cert_dir }}/kubelet.csr"
    ownca_path: "{{ cert_dir }}/{{ ca_cert_file }}"
    ownca_privatekey_path: "{{ cert_dir }}/{{ ca_key_file }}"
    provider: ownca
