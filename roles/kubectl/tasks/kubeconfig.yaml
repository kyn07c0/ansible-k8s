---

- name: Connection context generation
  when:
    - "'admin' in group_names"
  block:
    - name: Ganerate kubeconfig admin (set cluster)
      ansible.builtin.command: >
        kubectl config set-cluster k8s \
          --certificate-authority={{ cert_dir }}/{{ ca_cert_file }} \
          --embed-certs=true --server=https://{{ vip }}:6443
      changed_when: false

    - name: Ganerate kubeconfig admin (set credentials)
      ansible.builtin.command: >
        kubectl config set-credentials admin \
          --client-certificate={{ cert_dir }}/{{ kubectl_admin_cert_file }} \
          --client-key={{ cert_dir }}/{{ kubectl_admin_key_file }}
      changed_when: false

    - name: Ganerate kubeconfig admin (set context)
      ansible.builtin.command: >
        kubectl config set-context k8s \
          --cluster=k8s \
          --user=admin
      changed_when: false

    - name: Choosing the context for use
      ansible.builtin.command: >
        kubectl config use-context k8s
      changed_when: false
