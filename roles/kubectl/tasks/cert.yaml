---

###############################################################################
# Create a admin certificate
###############################################################################

- name: Certificate kubectl admin exists
  ansible.builtin.stat:
    path: "{{ cert_dir }}/{{ kubectl_admin_cert_file }}"
  register: admin_cert_file

- block:

    - name: Generate private key for kubectl admin
      community.crypto.openssl_privatekey:
        path: "{{ cert_local_dir }}/{{ kubectl_admin_key_file }}"
        size: "{{ key_size }}"
        type: "{{ key_type }}"
      delegate_to: localhost
      run_once: true
      become: false

    - name: Generate a certificate signing request with subject information
      community.crypto.openssl_csr:
        path: "{{ cert_local_dir }}/{{ kubectl_admin_csr_file }}"
        privatekey_path: "{{ cert_local_dir }}/{{ kubectl_admin_key_file }}"
        basic_constraints: "CA:FALSE"
        extended_key_usage:
          - clientAuth
        key_usage:
          - digitalSignature
          - keyEncipherment
        key_usage_critical: true
        common_name: "admin"
        organization_name: "system:masters"
        country_name: "{{ country_name }}"
        state_or_province_name: "{{ state_or_province_name }}"
        locality_name: "{{ locality_name }}"
        use_common_name_for_san: false
        create_subject_key_identifier: true
      delegate_to: localhost
      run_once: true
      become: false

    - name: Generate a certificate
      community.crypto.x509_certificate:
        path: "{{ cert_local_dir }}/{{ kubectl_admin_cert_file }}"
        privatekey_path: "{{ cert_local_dir }}/{{ kubectl_admin_key_file }}"
        csr_path: "{{ cert_local_dir }}/{{ kubectl_admin_csr_file }}"
        ownca_path: "{{ cert_local_dir }}/{{ ca_cert_file }}"
        ownca_privatekey_path: "{{ cert_local_dir }}/{{ ca_key_file }}"
        provider: ownca
      delegate_to: localhost
      run_once: true
      become: false

  when: not admin_cert_file.stat.exists

################################################################################
# Copy CA to remote servers
################################################################################

- name: Create cert directory
  file:
    path: "{{ cert_dir }}"
    state: directory

- name: Copy CA to remote servers
  ansible.builtin.copy:
    src: "{{ cert_local_dir }}/{{ item }}"
    dest: "{{ cert_dir }}/{{ item }}"
  loop:
    - "{{ ca_key_file }}"
    - "{{ ca_cert_file }}"

################################################################################
# Copy admin certificate to remote server
################################################################################

- name: Copy admin certificate to remote server
  ansible.builtin.copy:
    src: "{{ cert_local_dir }}/{{ item }}"
    dest: "{{ cert_dir }}/{{ item }}"
  loop:
    - "{{ kubectl_admin_key_file }}"
    - "{{ kubectl_admin_cert_file }}"
