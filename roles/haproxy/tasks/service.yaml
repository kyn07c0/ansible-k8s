---

- name: Install service HAProxy
  ansible.builtin.template:
    src: haproxy.service.j2
    dest: /etc/systemd/system/haproxy.service
  notify:
    - reload systemd

- name: Enable and start HAProxy
  ansible.builtin.systemd:
    name: haproxy
    state: started
    enabled: yes

- name: wait haproxy to be ready
  ansible.builtin.uri:
    url: "http://localhost:8080/haproxy?stats"
    url_username: "{{ haproxy_stats_user }}"
    url_password: "{{ haproxy_stats_password }}"
    status_code: 200
  until: haproxy_stats.status == 200
  retries: 10
  delay: 10
  register: haproxy_stats

- name: Terminate playbook if service is not running
  ansible.builtin.fail:
    msg: "The haproxy service is not running. Playbook has stoped."
  when: haproxy_stats.status != 200
