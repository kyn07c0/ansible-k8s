---

- name: Install service HAProxy
  ansible.builtin.template:
    src: haproxy.service.j2
    dest: /etc/systemd/system/haproxy.service
  notify:
    - reload systemd

- name: Enable and start HAProxy
  ansible.builtin.systemd:
    name: haproxy
    state: started
    enabled: yes

- name: Check started service
  ansible.builtin.service:
    name: haproxy
    state: started
  register: haproxy_service_status

- name: Terminate playbook if service is not running
  ansible.builtin.fail:
    msg: "The HAProxy service is not running. Playbook has stoped."
  when: haproxy_service_status.state != 'started'
