---

- name: preset
  hosts:
    - admin
    - lb
    - master
    - worker
  roles:
    - preset
  tags: preset

- name: ca_certificate
  hosts: localhost
  roles:
    - ca_certificate
  become: false
  tags: ca_certificate

- name: kubectl
  hosts:
    - admin
    - master
    - worker
  roles:
    - kubectl
  tags: kubectl

- name: etcd
  hosts: etcd
  roles:
    - etcd
  tags: etcd

- name: kube_apiserver
  hosts:
    - master
  roles:
    - kube_apiserver
  tags: kube-apiserver

- name: haproxy
  hosts:
    - lb
  roles:
    - haproxy
  tags: haproxy

- name: keepalived
  hosts:
    - lb
  roles:
    - keepalived
  tags: keepalived

- name: kube_scheduler
  hosts:
    - master
  roles:
    - kube_scheduler
  tags: kube-scheduler

- name: kube_controller_manager
  hosts:
    - master
  roles:
    - kube_controller_manager
  tags: kube-controller-manager

- name: crictl
  hosts:
    - worker
  roles:
    - crictl
  tags: crictl

